
data:
  train_path: "data/train.csv"
  test_path: "data/test.csv"

vectorizer:
  ngram_range: [1, 2]
  min_df: 2
  max_df: 0.95
  sublinear_tf: true
  max_features: 10000

model:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  early_stopping_rounds: 30
  eval_metric: "auc"
  random_state: 42
  scale_pos_weight: 0.93


training:
  test_size: 0.2
  random_state: 42
  n_folds: 5