data:
  train_path: data/data_train.csv
  test_path: data/data_test_fold1.csv
  expected_columns:
  - user_id
  - text_id
  - title
  - text
  - is_suicide
  text_columns:
  - title
  - text
  target_column: is_suicide
  value_true: 'yes'
  value_false: 'no'
preprocessing:
  variant: base
paths:
  model_output: models/lr_base.joblib
  reports_dir: reports
  roc_val_output: reports/lr_base_roc_val.png
  cm_val_output: reports/lr_base_cm_val.png
  metrics_val_output: reports/lr_base_training_metrics.json
  report_val_output: reports/lr_base_training_report.md
  roc_test_output: reports/lr_base_roc_test.png
  cm_test_output: reports/lr_base_cm_test.png
  metrics_test_output: reports/lr_base_test_metrics.json
  report_test_output: reports/lr_base_test_report.md
vectorizer:
  ngram_range:
  - 1
  - 1
  min_df: 4
  max_df: 0.8093
  sublinear_tf: false
  max_features: 50000
model:
  class: sklearn.linear_model.LogisticRegression
  solver: lbfgs
  penalty: l2
  random_state: 42
  C: 1.110118
  max_iter: 1494
training:
  test_size: 0.2
  random_state: 42
  n_splits: 5
